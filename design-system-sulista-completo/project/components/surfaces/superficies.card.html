<!-- @dsCard group="Components" viewport="700x330" subtitle="Card, Badge, Tag, Tabs" name="Superfícies" -->
<link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;padding:16px;background:var(--surface-page);font-family:var(--font-body);}</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script src="../../_dev_loader.js"></script>
<div id="root"></div>
<script type="text/babel">
window.__dsReady.then((NS)=>{
const {Card,Badge,Tag,Tabs} = NS;
ReactDOM.createRoot(document.getElementById('root')).render(
  <div style={{display:'flex',flexDirection:'column',gap:16}}>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
      <Card kicker="Serviços" title="Transporte fracionado" footer="Cobertura Sul e Sudeste" hoverable>
        <span style={{fontSize:14,color:'var(--neutral-600)'}}>Consolidação de cargas com prazo auditável.</span>
      </Card>
      <Card title="Viagem RTX-4B21">
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <Badge tone="success">Em trânsito</Badge>
          <Badge tone="warning">Aguardando doca</Badge>
          <Badge tone="danger">Atrasado</Badge>
          <Badge tone="info">Programada</Badge>
          <Badge tone="neutral" dot={false}>Rascunho</Badge>
        </div>
      </Card>
    </div>
    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
      <Tag>Refrigerada</Tag><Tag>Granel</Tag><Tag accent>Região Sul</Tag><Tag accent onRemove={()=>{}}>Frota própria</Tag>
    </div>
    <Tabs tabs={['Visão geral','Viagens','Manutenção','Documentos']} defaultActive={0} />
  </div>
);
});
</script>
